<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shiper</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="h-screen flex flex-col">
    
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        <h1 class="text-xl font-bold tracking-tight">Shiper</h1>
      </div>
      <button class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
        + Add Project
      </button>
    </header>

    <main class="flex-1 overflow-auto p-6">
      <div class="max-w-5xl mx-auto">
        <h2 class="text-lg font-semibold mb-4 text-gray-300 border-b border-gray-700 pb-2">Projects</h2>
        
        <div id="projects-container" class="grid gap-4">
          <div class="bg-gray-800 rounded-lg p-5 border border-gray-700 flex justify-between items-center">
            <div>
              <h3 class="font-medium text-lg text-white">jellyfin-renamer</h3>
              <p class="text-sm text-gray-400 mt-1">Status: <span class="text-green-400">Up to date</span> • Version: 0.1.4</p>
            </div>
            <button class="bg-gray-700 hover:bg-gray-600 text-gray-200 px-4 py-2 rounded text-sm transition-colors">
              Settings
            </button>
          </div>
        </div>

      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
