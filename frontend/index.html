<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shiper</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="bg-gray-900 text-gray-100 font-sans h-screen flex flex-col antialiased">
    
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between shadow-sm">
      <div class="flex items-center space-x-3">
        <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        <h1 class="text-xl font-bold tracking-tight text-white">Shiper</h1>
      </div>
      <button id="btn-open-modal" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors shadow-sm">
        + Add Project
      </button>
    </header>

    <main class="flex-1 overflow-auto p-6">
      <div class="max-w-5xl mx-auto">
        <h2 class="text-lg font-semibold mb-4 text-gray-300 border-b border-gray-700 pb-2">Projects Dashboard</h2>
        
        <div id="projects-container" class="grid gap-4">
          <div class="text-gray-400 text-center py-8 bg-gray-800 rounded-lg border border-gray-700 dashed animate-pulse">
            Loading projects...
          </div>
        </div>

      </div>
    </main>

    <div id="add-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
      <div class="bg-gray-800 border border-gray-700 rounded-xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
        <div class="px-6 py-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
          <h3 class="text-lg font-semibold text-white">Add New Project</h3>
          <button id="btn-close-modal" class="text-gray-400 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
        
        <form id="add-project-form" class="p-6 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Project Name</label>
            <input type="text" id="proj-name" required placeholder="e.g., jellyfin-renamer" class="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Git Repository URL</label>
            <input type="url" id="proj-repo" required placeholder="https://github.com/user/repo.git" class="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Branch</label>
            <input type="text" id="proj-branch" required placeholder="main" value="main" class="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
          </div>
          
          <div class="pt-4 flex justify-end space-x-3">
            <button type="button" id="btn-cancel-modal" class="px-4 py-2 text-sm font-medium text-gray-300 hover:text-white transition-colors">Cancel</button>
            <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-md text-sm font-medium shadow-sm transition-colors">
              Save Project
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
